services:
  - type: web
    name: karma-backend
    env: python
    rootDirectoryPath: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true